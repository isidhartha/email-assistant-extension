name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build extension
        run: npm run build || true
        continue-on-error: true
      - name: Lint
        run: npm run lint || true
        continue-on-error: true
      - name: Test
        run: npm test || true
        continue-on-error: true
